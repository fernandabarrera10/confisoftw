<app-navbar></app-navbar>

<section class="login-container">

  <form
    class="login-card"
    (ngSubmit)="ingresar()"
  >

    <h1>
      Iniciar Sesión
    </h1>

    <input
      type="text"
      placeholder="Usuario"
      [(ngModel)]="usuario"
      name="usuario"
      required
    >

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
      name="password"
      required
    >

    <button
      type="submit"
      [disabled]="!usuario || !password"
    >
      Ingresar
    </button>

  </form>

</section>

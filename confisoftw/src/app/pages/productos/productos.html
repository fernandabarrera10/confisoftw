<app-navbar></app-navbar>

<section class="productos-container">

  <h1>
    Nuestros Productos
  </h1>

  <div class="productos-grid">

    @for(producto of productos; track producto){

      <div class="card">

        <img
          [src]="producto.imagen"
          [alt]="producto.nombre"
        >

        <h2>
          {{ producto.nombre }}
        </h2>

        <p>
          $ {{ producto.precio }}
        </p>

        <button>
          Agregar al carrito
        </button>

      </div>

    }

  </div>

</section>

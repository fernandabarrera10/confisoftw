<app-navbar></app-navbar>

<section class="admin-container">

  <h1>
    Panel Administrador
  </h1>

  <div class="formulario">

    <input
      type="text"
      placeholder="Nombre producto"
      [(ngModel)]="nombre"
    >

    <input
      type="number"
      placeholder="Precio"
      [(ngModel)]="precio"
    >

    <input
      type="text"
      placeholder="URL imagen"
      [(ngModel)]="imagen"
    >

    <button
      (click)="agregarProducto()"
    >
      Agregar Producto
    </button>

  </div>

  <div class="productos">

    @for(producto of productos; track producto){

      <div class="card">

        <img
          [src]="producto.imagen"
        >

        <h2>
          {{ producto.nombre }}
        </h2>

        <p>
          $ {{ producto.precio }}
        </p>

      </div>

    }

  </div>

</section>
